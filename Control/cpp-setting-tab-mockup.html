<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combinator Curve Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&family=Noto+Sans+KR:wght@400;500;700&display=swap">
  <style>
    /* ==========================================================
       Token layer — sourced from Figma HiNAS Control design system
       ========================================================== */
    :root {
      /* Surfaces (Dusk mode) */
      --color-bg-overlay: rgba(0, 0, 0, 0.64);
      --color-bg-base: #0E0F12;           /* Gray/50 */
      --color-bg-surface: #15161A;        /* Gray/100 */
      --color-bg-raised: #1B1C21;         /* Gray/200 */
      --color-bg-raised-hover: #23252B;   /* Gray/300 */
      --color-bg-input: #23252B;          /* Gray/300 */
      --color-bg-input-hover: #3C3E47;    /* Gray/400 */

      /* Borders */
      --color-border-subtle: rgba(255, 255, 255, 0.08);
      --color-border-default: #3C3E47;    /* Gray/400 */
      --color-border-emphasis: #5A5D67;   /* Gray/500 */

      /* Text */
      --color-text-muted: #858998;        /* Gray/600 */
      --color-text-secondary: #B0B3BF;    /* Gray/700 */
      --color-text-primary: #D0D2D9;      /* Gray/800 */
      --color-text-emphasis: #ECEDF0;     /* Gray/900 */
      --color-text-on-primary: #0E0F12;   /* Gray/50 — Figma places dark text on Blue/500 fills */

      /* White-overlay tokens (Figma "White/N" scale) */
      --color-white-4: rgba(255, 255, 255, 0.04);
      --color-white-6: rgba(255, 255, 255, 0.06);
      --color-white-8: rgba(255, 255, 255, 0.08);

      /* Brand / semantic */
      --color-primary: #1379F3;           /* Blue/400 */
      --color-primary-hover: #348FF4;     /* Blue/500 */
      --color-primary-subtle: #004DA3;    /* Blue/100 */
      --color-danger: #FF4141;            /* Red/500 */
      --color-danger-hover: #EA2929;      /* Red/400 */
      --color-danger-subtle: #A50000;     /* Red/100 */
      --color-warning: #F4810C;           /* Orange/600 */
      --color-success: #2BB46D;           /* Green/600 */

      /* Typography — sourced 1:1 from Figma (HiNAS Control "1M/" scale).
         Figma "Semi Bold" for Inter is weight 550 (not 600). */
      --font-family: "Inter", "Noto Sans KR", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      --text-body-2-b: 500 20px/28px var(--font-family);   /* 1M/Body 2 Bold — page titles */
      --text-body-2:   400 20px/28px var(--font-family);   /* regular 20/28 (not in Figma; kept for flexibility) */
      --text-body-1-b: 550 18px/24px var(--font-family);   /* 1M/Body 1 Bold */
      --text-body-1:   400 18px/24px var(--font-family);   /* 1M/Body 1 */
      --text-caption-b:500 16px/24px var(--font-family);   /* 1M/Caption Bold */
      --text-caption:  400 16px/24px var(--font-family);   /* 1M/Caption */

      /* Spacing (4px grid) */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-2xl: 32px;
      --space-3xl: 48px;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* Shadows */
      --shadow-dialog: 0 8px 16px rgba(0, 0, 0, 0.24);
      --shadow-modal:  0 2px 8px rgba(0, 0, 0, 0.4), 0 9px 20px rgba(0, 0, 0, 0.4);
      --shadow-toast:  0 4px 12px rgba(0, 0, 0, 0.32);

      /* Motion */
      --transition-fast: 120ms ease;
      --transition-default: 200ms ease;

      /* Dialog sizing */
      --dialog-max-width: 1120px;
      --dialog-min-height: 680px;
    }

    /* ==========================================================
       Base / reset
       ========================================================== */
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-family);
      color: var(--color-text-primary);
      background: var(--color-bg-base);
      display: grid;
      place-items: center;
      padding: var(--space-xl);
      min-height: 100vh;
    }
    button { font-family: inherit; }
    input { font-family: inherit; }
    select { font-family: inherit; }
    ::selection { background: var(--color-primary); color: var(--color-text-on-primary); }

    /* ==========================================================
       Dialog shell
       ========================================================== */
    .dialog {
      width: min(var(--dialog-max-width), 96vw);
      min-height: var(--dialog-min-height);
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-dialog);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ==========================================================
       Tab bar
       ========================================================== */
    .tabs {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-lg) 0;
      border-bottom: 1px solid var(--color-border-subtle);
    }
    .tab {
      position: relative;
      background: transparent;
      border: 0;
      color: var(--color-text-muted);
      font: var(--text-caption-b);
      padding: var(--space-md) var(--space-lg);
      cursor: pointer;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .tab:hover { color: var(--color-text-secondary); background: rgba(255,255,255,0.04); }
    .tab.is-active {
      color: var(--color-text-emphasis);
    }
    .tab.is-active::after {
      content: "";
      position: absolute;
      left: var(--space-lg);
      right: var(--space-lg);
      bottom: -1px;
      height: 2px;
      background: var(--color-primary);
    }
    .tab-close {
      margin-left: auto;
      background: transparent;
      border: 0;
      color: var(--color-text-muted);
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .tab-close:hover { color: var(--color-text-emphasis); background: rgba(255,255,255,0.06); }

    /* ==========================================================
       Panel (each tab's content area)
       ========================================================== */
    .panels { flex: 1; display: flex; flex-direction: column; }
    .panel { display: none; flex: 1; flex-direction: column; padding: var(--space-xl); }
    .panel.is-active { display: flex; }
    .panel-placeholder {
      color: var(--color-text-muted);
      border: 1px dashed var(--color-border-subtle);
      border-radius: var(--radius-sm);
      padding: var(--space-lg);
      font: var(--text-caption);
    }

    /* ==========================================================
       Page header (shared Page 1 + Page 2)
       ========================================================== */
    .page-header {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      margin-bottom: var(--space-lg);
    }
    .page-header__title-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .page-header__title {
      margin: 0;
      font: var(--text-body-2-b);
      color: var(--color-text-emphasis);
    }
    .page-header__back {
      background: transparent;
      border: 0;
      color: var(--color-text-primary);
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .page-header__back:hover { color: var(--color-text-emphasis); background: rgba(255,255,255,0.06); }
    .page-header__subtitle {
      margin: 0;
      font: var(--text-caption);
      color: var(--color-text-muted);
    }

    /* ==========================================================
       Buttons
       ========================================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      height: 40px;
      min-width: 96px;                       /* baseline so equal-context CTAs render the same width */
      padding: 0 var(--space-lg);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      font: var(--text-caption-b);
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast), opacity var(--transition-fast);
      white-space: nowrap;
    }
    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(19, 121, 243, 0.4);
    }
    .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

    .btn--primary {
      background: var(--color-primary);
      color: var(--color-text-on-primary);
    }
    .btn--primary:hover:not([disabled]) { background: var(--color-primary-hover); }

    .btn--secondary {
      background: var(--color-bg-raised);
      color: var(--color-text-primary);
      border-color: var(--color-border-default);
    }
    .btn--secondary:hover:not([disabled]) {
      background: var(--color-bg-raised-hover);
      color: var(--color-text-emphasis);
      border-color: var(--color-border-emphasis);
    }

    .btn--ghost {
      background: transparent;
      color: var(--color-text-primary);
      border-color: var(--color-border-subtle);
    }
    .btn--ghost:hover:not([disabled]) {
      background: rgba(255,255,255,0.04);
      color: var(--color-text-emphasis);
    }

    /* Destructive intent uses secondary/neutral styling (no red).
       The verb in the label ("Delete", "Discard") carries the signal. */
    .btn--danger,
    .btn--danger-solid {
      background: var(--color-bg-raised);
      color: var(--color-text-primary);
      border-color: var(--color-border-default);
    }
    .btn--danger:hover:not([disabled]),
    .btn--danger-solid:hover:not([disabled]) {
      background: var(--color-bg-raised-hover);
      color: var(--color-text-emphasis);
      border-color: var(--color-border-emphasis);
    }

    .btn--sm { height: 32px; min-width: 0; padding: 0 var(--space-md); font: var(--text-caption); }
    .btn__icon { display: inline-grid; place-items: center; line-height: 0; }
    .btn__icon svg { display: block; }

    /* ----------------------------------------------------------------
       48_Fix_BTN (Figma): the page-level/footer CTA component.
       Spec: 48px tall, 160px min-width, 3px radius, 20px H padding,
       Inter Semi Bold (weight 550) 18/24.
       Variants re-skin background/border per Figma 48_Fix_BTN_Primary/Sub.
       ---------------------------------------------------------------- */
    .btn--lg {
      height: 48px;
      min-width: 160px;
      padding: 0 20px;
      border-radius: 3px;
      font: var(--text-body-1-b);
    }
    .btn--lg.btn--primary {
      background: var(--color-primary-hover);                /* Blue/500 = #348FF4 */
      color: var(--color-text-on-primary);                   /* Gray/50 */
      border-color: var(--color-white-6);
    }
    .btn--lg.btn--primary:hover:not([disabled]) { background: var(--color-primary); }
    .btn--lg.btn--secondary {
      background: var(--color-white-4);
      color: var(--color-text-emphasis);                     /* Gray/900 */
      border-color: var(--color-white-8);
    }
    .btn--lg.btn--secondary:hover:not([disabled]) {
      background: var(--color-white-8);
      color: var(--color-text-emphasis);
      border-color: var(--color-white-8);
    }
    /* Destructive CTA on large footer buttons adopts the "Sub" neutral skin.
       Same white-overlay chrome as btn--lg.btn--secondary. */
    .btn--lg.btn--danger,
    .btn--lg.btn--danger-solid {
      background: var(--color-white-4);
      color: var(--color-text-emphasis);
      border-color: var(--color-white-8);
    }
    .btn--lg.btn--danger:hover:not([disabled]),
    .btn--lg.btn--danger-solid:hover:not([disabled]) {
      background: var(--color-white-8);
      color: var(--color-text-emphasis);
      border-color: var(--color-white-8);
    }

    .btn--icon-only { width: 32px; padding: 0; }

    /* Inline spinner for saving state */
    .btn-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.32);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* ==========================================================
       Page 1 — Profile list
       ========================================================== */
    .section-label {
      font: var(--text-body-1-b);
      color: var(--color-text-emphasis);
      margin: var(--space-lg) 0 var(--space-sm);
    }
    .section-label:first-child { margin-top: 0; }

    /* Section header with title on left + action CTA on right end. */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
      margin: var(--space-lg) 0 var(--space-sm);
    }
    .section-header > .section-label { margin: 0; }

    /* ----------------------------------------------------------------
       Profile list — individual boxed rows, no outer container.
       Every variant (selected / other / add) shares the same height (56px)
       and the same 3-column grid (24px icon │ 1fr name │ auto action).
       ---------------------------------------------------------------- */
    .profile-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .profile-item {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: var(--space-md);
      height: 56px;
      padding: 0 var(--space-lg);
      background: var(--color-bg-raised);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      cursor: default;
      transition: background var(--transition-fast), border-color var(--transition-fast);
      position: relative;
    }
    .profile-item--selected {
      border-color: var(--color-primary-subtle);
    }
    .profile-item--selectable { cursor: pointer; }
    .profile-item--selectable:hover {
      background: var(--color-bg-raised-hover);
      border-color: var(--color-border-default);
    }
    .profile-item__check {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      color: var(--color-text-primary);
    }
    .profile-item__name {
      font: var(--text-body-1);
      color: var(--color-text-primary);
    }
    .profile-item--selected .profile-item__name {
      font: var(--text-body-1-b);
      color: var(--color-text-emphasis);
    }
    .profile-item__action {
      display: inline-flex;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }
    .profile-item--selected .profile-item__action { opacity: 1; }
    .profile-item--selectable:hover .profile-item__action,
    .profile-item--selectable:focus-within .profile-item__action { opacity: 1; }
    .profile-item--selecting { pointer-events: none; }
    .profile-item--selecting .profile-item__action { opacity: 1; }
    .profile-list--selecting .profile-item:not(.profile-item--selecting) {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Add Profile row — same 56px height and grid as .profile-item,
       dashed border to signal it's an action rather than a profile. */
    .add-profile-row {
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: var(--space-md);
      height: 56px;
      padding: 0 var(--space-lg);
      background: transparent;
      border: 1px dashed var(--color-border-default);
      border-radius: var(--radius-md);
      color: var(--color-text-secondary);
      font: var(--text-body-1);
      text-align: left;
      cursor: pointer;
      width: 100%;
      transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
    }
    .add-profile-row__icon { display: grid; place-items: center; width: 24px; height: 24px; }
    .add-profile-row:hover {
      background: rgba(255,255,255,0.04);
      border-color: var(--color-border-emphasis);
      color: var(--color-text-emphasis);
    }

    /* ==========================================================
       Page 2 — Editor
       ========================================================== */
    .editor-layout {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
      flex: 1;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-md);
    }
    .chart-card {
      background: rgba(16, 19, 27, 0.72);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-sm);
      padding: var(--space-sm);
      display: grid;
      gap: var(--space-sm);
    }
    .chart-card__title {
      margin: 0;
      font: var(--text-caption-b);
      color: var(--color-text-secondary);
    }
    .chart-canvas {
      width: 100%;
      height: 188px;
      display: block;
      border: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(180deg, rgba(42,47,59,0.48), rgba(18,21,30,0.55));
    }

    .table-wrap {
      border: 0;
      border-radius: 0;
      overflow: auto;
      max-height: 360px;
      background: transparent;
    }
    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: left;
      padding: var(--space-md);
      font: var(--text-caption-b);
      color: var(--color-text-secondary);
      background: transparent;
      border-bottom: 1px solid var(--color-border-subtle);
    }
    tbody td {
      padding: var(--space-sm) var(--space-md);
      border-top: 0;                           /* dividers handled by .insert-row */
      vertical-align: middle;
      font: var(--text-caption);
      background: transparent;                 /* no row fill */
    }
    tbody td.mono { font-family: var(--font-mono); color: var(--color-text-secondary); }
    .cell-input {
      width: 100%;
      height: 32px;
      background: var(--color-bg-input);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-sm);
      color: var(--color-text-primary);
      padding: 0 var(--space-md);
      font: var(--text-caption);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .cell-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(19,121,243,0.24);
    }
    .cell-input.is-invalid {
      border-color: var(--color-danger);
      box-shadow: 0 0 0 2px rgba(255,65,65,0.2);
    }
    .cell-input.is-invalid:focus {
      box-shadow: 0 0 0 2px rgba(255,65,65,0.32);
    }
    /* Tooltip for invalid cell — appears ABOVE the input with a small caret
       pointing down at the field. */
    .cell-wrap { position: relative; }
    .cell-tooltip {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      background: var(--color-bg-raised);
      border: 1px solid var(--color-danger);
      color: var(--color-danger);
      font: var(--text-caption);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      z-index: 5;
      box-shadow: var(--shadow-toast);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-fast);
    }
    /* Caret — two stacked triangles to fake a 1px border around the arrow */
    .cell-tooltip::before,
    .cell-tooltip::after {
      content: '';
      position: absolute;
      left: 14px;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
    }
    .cell-tooltip::before {
      top: 100%;
      border-top: 6px solid var(--color-danger);   /* outline triangle */
    }
    .cell-tooltip::after {
      top: calc(100% - 1px);
      border-top: 6px solid var(--color-bg-raised); /* fill triangle, 1px above to leave a thin border edge */
    }
    .cell-wrap:hover .cell-tooltip,
    .cell-wrap:focus-within .cell-tooltip { opacity: 1; }

    /* Insert row — Figma reference 8525:124098.
       Layout: small "+ Add" CTA on the left, dashed line filling remaining width.
       The dashed line acts as the visual divider between data rows. */
    .insert-row td {
      padding: 0;
      background: transparent;
      border: 0;
      height: 28px;
    }
    .insert-row__inner {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      height: 28px;
      width: 100%;
    }
    .insert-add-btn {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 28px;
      padding: 0 10px;
      background: var(--color-white-4);
      border: 1px solid var(--color-white-8);
      border-radius: var(--radius-sm);
      color: var(--color-text-emphasis);
      font: var(--text-caption-b);
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
    }
    .insert-add-btn:hover {
      background: var(--color-white-8);
      border-color: var(--color-border-emphasis);
    }
    .insert-add-btn svg { width: 14px; height: 14px; }
    .insert-connector {
      flex: 1;
      height: 0;
      border-top: 1px dashed var(--color-border-default);
    }
    /* Last insert row (after the final data row) is a full-width CTA pill — no connector. */
    .insert-row--last .insert-row__inner { gap: 0; }
    .insert-row--last .insert-add-btn {
      flex: 1;
      justify-content: center;
      height: 36px;
      border-style: dashed;
    }
    .insert-row--last .insert-connector { display: none; }

    /* Trash-icon delete button (replaces "Delete" text button per Figma). */
    .btn-icon-only {
      display: inline-grid;
      place-items: center;
      width: 32px;
      height: 32px;
      padding: 0;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
    }
    .btn-icon-only:hover:not([disabled]) {
      background: var(--color-white-4);
      border-color: var(--color-white-8);
      color: var(--color-text-emphasis);
    }
    .btn-icon-only[disabled] { opacity: 0.4; cursor: not-allowed; }

    .editor-footer {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding-top: var(--space-lg);
      margin-top: auto;
      border-top: 1px solid var(--color-border-subtle);
    }
    .editor-footer__right {
      margin-left: auto;
      display: flex;
      gap: var(--space-md);
    }

    /* ==========================================================
       Feedback — banner, toast, empty, loading
       ========================================================== */
    .banner {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: rgba(255,65,65,0.08);
      border: 1px solid rgba(255,65,65,0.32);
      border-radius: var(--radius-sm);
      color: var(--color-text-emphasis);
      font: var(--text-caption);
      margin-bottom: var(--space-md);
    }
    .banner__icon { color: var(--color-danger); display: grid; place-items: center; }
    .banner__body { flex: 1; }
    .banner__actions { display: flex; gap: var(--space-sm); }

    /* ----------------------------------------------------------------
       Snackbar — Figma node 9244:123672
       • Position: fixed, bottom-center of viewport, 24px margin
       • Surface: Gray/300 bg + White/8 hairline border + Dusk mode/300 shadow
       • Radius: 8px
       • Padding: 12px 16px, 16px gap between icon/body/action/close
       • Typography: 1M/Caption for body, 1M/Caption Bold for action
       • Action (Undo / Try again) uses Orange/600 text
       ---------------------------------------------------------------- */
    .toast-stack {
      position: absolute;    /* anchored to .dialog (position: relative), not the viewport */
      left: 50%;
      bottom: var(--space-xl);
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      z-index: 10;
      pointer-events: none;
      align-items: center;
      max-width: calc(100% - var(--space-2xl));   /* keep toast inside dialog padding */
    }
    .toast {
      min-height: 48px;
      min-width: 273px;
      max-width: 592px;
      padding: var(--space-md) var(--space-lg);
      background: var(--color-bg-raised-hover);    /* Gray/300 #23252B */
      border: 1px solid var(--color-white-8);
      border-radius: var(--radius-md);              /* 8px */
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.24);   /* Dusk mode/300 */
      display: inline-flex;
      align-items: center;
      gap: var(--space-lg);
      color: var(--color-text-emphasis);
      font: var(--text-caption);
      pointer-events: auto;
      animation: toast-in 200ms ease;
    }
    .toast__icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
    }
    .toast--success .toast__icon { color: var(--color-success); }
    .toast--error .toast__icon   { color: var(--color-warning); }   /* Orange/600 per Figma */
    .toast__body {
      flex: 1 1 auto;
      min-width: 0;
    }
    .toast__action {
      background: transparent;
      border: 0;
      color: var(--color-warning);                   /* Orange/600 per Figma */
      font: var(--text-caption-b);
      cursor: pointer;
      padding: 4px 4px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
    }
    .toast__action:hover { background: rgba(244, 129, 12, 0.12); }
    .toast__close {
      background: transparent;
      border: 0;
      color: var(--color-text-muted);
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: var(--radius-sm);
      flex: 0 0 32px;
      margin: -6px -6px -6px 0;  /* pulls close inside the 12px vertical padding */
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .toast__close:hover {
      color: var(--color-text-emphasis);
      background: rgba(255, 255, 255, 0.06);
    }
    @keyframes toast-in {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .centered-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: var(--space-md);
      padding: var(--space-3xl);
    }
    .centered-state__title {
      margin: 0;
      font: var(--text-body-1-b);
      color: var(--color-text-emphasis);
    }
    .centered-state__body {
      margin: 0;
      font: var(--text-caption);
      color: var(--color-text-muted);
      max-width: 360px;
    }
    .centered-state__cta { margin-top: var(--space-sm); }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--color-text-secondary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .spinner--sm {
      width: 16px;
      height: 16px;
      border-width: 2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ==========================================================
       Modals
       ========================================================== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: var(--color-bg-overlay);
      display: grid;
      place-items: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-default);
    }
    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      position: relative;
      width: 420px;
      max-width: calc(100vw - 32px);
      background: var(--color-bg-raised);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-modal);
      padding: var(--space-xl);
      transform: translateY(8px);
      transition: transform var(--transition-default);
    }
    .modal-backdrop.is-open .modal { transform: translateY(0); }
    .modal__close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
    }
    .modal__close:hover {
      background: var(--color-white-4);
      border-color: var(--color-white-8);
      color: var(--color-text-emphasis);
    }
    .modal__title {
      margin: 0 0 var(--space-md);
      padding-right: var(--space-2xl);   /* leave room for the close icon */
      font: var(--text-body-2-b);
      color: var(--color-text-emphasis);
    }
    .modal__body {
      font: var(--text-body-1);
      color: var(--color-text-primary);
      margin-bottom: var(--space-xl);
    }
    .modal__field {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      margin-top: var(--space-md);
    }
    .modal__field-label {
      font: var(--text-caption);
      color: var(--color-text-muted);
    }
    .modal__field-input {
      height: 40px;
      background: var(--color-bg-input);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-sm);
      color: var(--color-text-primary);
      padding: 0 var(--space-md);
      font: var(--text-caption);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .modal__field-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(19,121,243,0.24);
    }
    .modal__field-input.is-invalid {
      border-color: var(--color-danger);
      box-shadow: 0 0 0 2px rgba(255,65,65,0.2);
    }
    .modal__field-error {
      font: var(--text-caption);
      color: var(--color-danger);
      min-height: 20px;
    }
    .modal__footer {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-sm);
    }
    .modal__footer--spread { justify-content: space-between; }
    /* Modal CTAs have parity: every footer button is at least 96px and the
       paired buttons (e.g. Save / Cancel) end up the same width. */
    .modal__footer .btn,
    .modal__footer--spread .btn { min-width: 96px; }

    /* ==========================================================
       Dev demo dropdown (QA state toggles) — top-left floating
       ========================================================== */
    .dev-panel {
      position: fixed;
      left: var(--space-lg);
      top: var(--space-lg);
      z-index: 2000;
    }
    .dev-panel__trigger {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      height: 36px;
      padding: 0 var(--space-md);
      background: var(--color-bg-raised);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      color: var(--color-text-primary);
      font: var(--text-caption-b);
      cursor: pointer;
      box-shadow: var(--shadow-toast);
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }
    .dev-panel__trigger:hover {
      background: var(--color-bg-raised-hover);
      border-color: var(--color-border-emphasis);
      color: var(--color-text-emphasis);
    }
    .dev-panel__trigger-label { color: var(--color-text-muted); }
    .dev-panel__trigger-current { color: var(--color-text-emphasis); }
    .dev-panel__caret {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(-45deg);     /* right-arrow when closed */
      opacity: 0.6;
      margin-left: 2px;
      transition: transform var(--transition-fast);
    }
    .dev-panel.is-open .dev-panel__caret {
      transform: rotate(45deg);      /* down-arrow when open */
    }
    .dev-panel__menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 240px;
      flex-direction: column;
      gap: 2px;
      padding: var(--space-sm);
      background: var(--color-bg-raised);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-toast);
    }
    .dev-panel.is-open .dev-panel__menu { display: flex; }
    .dev-panel__menu-title {
      font: var(--text-caption);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;

    }
    .dev-panel__btn {
      background: transparent;
      border: 0;
      text-align: left;
      font: var(--text-caption);
      color: var(--color-text-primary);
      padding: 6px 8px;

    }
    .dev-panel__btn:hover {
      background: var(--color-bg-raised-hover);

    /* ==========================================================
       Responsive
       ========================================================== */
    @media (max-width: 980px) {
      .chart-grid { grid-template-columns: 1fr; }

<body>
  <!-- Dialog shell with tab bar. Only the Combinator panel is fully built. -->
  <section class="dialog" role="dialog" aria-labelledby="dialog-title">

    <div class="panels">

    <!-- Toast stack lives inside the dialog so it's clipped to the dialog's bounds
         and anchored to its bottom — not the viewport. -->
    <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  </section>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true"></div>

  <!-- Dev demo dropdown — floating, top-left -->
  <aside class="dev-panel" id="devPanel">
    <button type="button" class="dev-panel__trigger" id="devTrigger" aria-haspopup="menu" aria-expanded="false">
      <span class="dev-panel__trigger-label">Demo:</span>
      <span class="dev-panel__trigger-current" id="devCurrentLabel">Populated</span>
      <span class="dev-panel__caret" aria-hidden="true"></span>
    </button>
    <div class="dev-panel__menu" role="menu" id="devMenu">
      <span class="dev-panel__menu-title">Page 1 — Profile list</span>
      <button class="dev-panel__btn" data-dev="populated"   data-label="Populated">Populated (default)</button>
      <button class="dev-panel__btn" data-dev="loading"     data-label="Loading">Loading</button>
      <button class="dev-panel__btn" data-dev="empty"       data-label="Empty">Empty</button>
